<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Búsqueda – SiniestrosAuto</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
<div class="flex min-h-screen">

  <div id="sidebar"></div>

  <div class="flex-1 flex flex-col overflow-auto">

    <div class="bg-white border-b border-gray-200 px-8 py-4">
      <div class="flex items-center gap-2 text-sm text-gray-500 mb-1">
        <a href="dashboard.html" class="hover:text-blue-600">Panel</a>
        <span>›</span>
        <span class="text-gray-800 font-medium">Búsqueda</span>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">Búsqueda de Siniestros</h1>
    </div>

    <div class="p-8">
      <div class="max-w-4xl mx-auto">

        <!-- Buscador principal -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-5">
          <h2 class="text-sm font-semibold text-gray-700 mb-4">Criterios de búsqueda</h2>

          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-4">
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">Número de póliza</label>
              <input id="busPoliza" type="text" placeholder="Ej. POL-00234"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">Nombre del cliente</label>
              <input id="busCliente" type="text" placeholder="Nombre o apellido"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">Placas</label>
              <input id="busPlacas" type="text" placeholder="Ej. ABC-123"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">Número de serie</label>
              <input id="busSerie" type="text" placeholder="VIN / No. serie"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">Compañía de seguros</label>
              <select id="busCompania" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Todas</option>
                <option>AXA Seguros</option>
                <option>GNP Seguros</option>
                <option>Qualitas</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">Fecha del siniestro</label>
              <input id="busFecha" type="date"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
          </div>

          <div class="flex gap-3">
            <button onclick="buscar()"
              class="bg-blue-700 hover:bg-blue-800 text-white px-6 py-2 rounded-lg text-sm font-medium transition-colors">
              Buscar
            </button>
            <button onclick="limpiar()"
              class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors">
              Limpiar
            </button>
          </div>
        </div>

        <!-- Resultados -->
        <div id="resultados" class="hidden bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <div class="px-5 py-3 border-b border-gray-100">
            <h2 class="text-sm font-semibold text-gray-700">Resultados <span id="countBus" class="text-gray-400 font-normal"></span></h2>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="bg-gray-50 text-xs text-gray-500 uppercase tracking-wide">
                  <th class="text-left px-5 py-3 font-semibold">Póliza</th>
                  <th class="text-left px-5 py-3 font-semibold">Cliente</th>
                  <th class="text-left px-5 py-3 font-semibold">Vehículo</th>
                  <th class="text-left px-5 py-3 font-semibold">Fecha</th>
                  <th class="text-left px-5 py-3 font-semibold">Estado</th>
                  <th class="text-left px-5 py-3 font-semibold">Detalle</th>
                </tr>
              </thead>
              <tbody id="tablaResultados" class="divide-y divide-gray-50"></tbody>
            </table>
          </div>
        </div>

        <!-- Estado vacío -->
        <div id="sinResultados" class="hidden bg-white rounded-xl shadow-sm border border-gray-100 p-12 text-center">
          <p class="text-4xl mb-3">🔍</p>
          <p class="text-gray-500 font-medium">No se encontraron siniestros</p>
          <p class="text-gray-400 text-sm mt-1">Intenta con otros criterios de búsqueda.</p>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="session.js"></script>
<script src="nav.js"></script>
<script>
  SESSION.requerir('busqueda.html');
  document.getElementById('sidebar').innerHTML = renderNav('busqueda.html');

  const datos = [
    { poliza: 'POL-00234', cliente: 'Juan Pérez',    vehiculo: 'Toyota Corolla · ABC-123', serie: '3VWFE21C04M000001', compania: 'AXA Seguros',  fecha: '2026-03-03', estado: 'En revisión',   estadoClass: 'bg-yellow-100 text-yellow-700' },
    { poliza: 'POL-00891', cliente: 'Ana López',      vehiculo: 'Nissan Versa · XYZ-789',  serie: '3N1BC1APXAL000002', compania: 'GNP Seguros',  fecha: '2026-02-28', estado: 'Aprobado',       estadoClass: 'bg-green-100 text-green-700' },
    { poliza: 'POL-01102', cliente: 'Carlos Mendoza', vehiculo: 'Honda Civic · MNO-456',   serie: '2HGFG3B59DH000003', compania: 'Qualitas',      fecha: '2026-02-20', estado: 'Cerrado',        estadoClass: 'bg-purple-100 text-purple-700' },
  ];

  // Convierte fecha DD/MM/YYYY o YYYY-MM-DD a objeto Date para comparación
  function toDate(str) {
    if (!str) return null;
    // Si viene en formato YYYY-MM-DD (input date)
    if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return new Date(str);
    // Si viene en formato DD/MM/YYYY (display)
    const [d, m, y] = str.split('/');
    return new Date(`${y}-${m}-${d}`);
  }

  function buscar() {
    const poliza   = document.getElementById('busPoliza').value.trim().toLowerCase();
    const cliente  = document.getElementById('busCliente').value.trim().toLowerCase();
    const placas   = document.getElementById('busPlacas').value.trim().toLowerCase();
    const serie    = document.getElementById('busSerie').value.trim().toLowerCase();
    const compania = document.getElementById('busCompania').value;
    const fecha    = document.getElementById('busFecha').value; // YYYY-MM-DD

    const tieneCritero = poliza || cliente || placas || serie || compania || fecha;
    if (!tieneCritero) {
      renderResultados(datos);
      return;
    }

    const filtrado = datos.filter(s => {
      if (poliza   && !s.poliza.toLowerCase().includes(poliza))    return false;
      if (cliente  && !s.cliente.toLowerCase().includes(cliente))  return false;
      if (placas   && !s.vehiculo.toLowerCase().includes(placas))  return false;
      if (serie    && !s.serie.toLowerCase().includes(serie))      return false;
      if (compania && s.compania !== compania)                      return false;
      if (fecha) {
        const fechaSiniestro = toDate(s.fecha);
        const fechaBusqueda  = toDate(fecha);
        if (!fechaSiniestro || fechaSiniestro.toDateString() !== fechaBusqueda.toDateString()) return false;
      }
      return true;
    });

    renderResultados(filtrado);
  }

  function renderResultados(data) {
    const cont = document.getElementById('resultados');
    const empty = document.getElementById('sinResultados');
    const tbody = document.getElementById('tablaResultados');

    if (!data.length) {
      cont.classList.add('hidden');
      empty.classList.remove('hidden');
      return;
    }

    empty.classList.add('hidden');
    cont.classList.remove('hidden');
    document.getElementById('countBus').textContent = `(${data.length} encontrados)`;

    tbody.innerHTML = data.map(s => {
      const fechaDisplay = s.fecha.split('-').reverse().join('/');
      return `
      <tr class="hover:bg-gray-50 transition-colors">
        <td class="px-5 py-3 font-mono text-xs text-gray-700">${s.poliza}</td>
        <td class="px-5 py-3 font-medium text-gray-800">${s.cliente}</td>
        <td class="px-5 py-3 text-gray-600">${s.vehiculo}</td>
        <td class="px-5 py-3 text-gray-600">${fechaDisplay}</td>
        <td class="px-5 py-3">
          <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${s.estadoClass}">${s.estado}</span>
        </td>
        <td class="px-5 py-3">
          <a href="detalle_siniestro.html" class="text-blue-600 hover:text-blue-800 text-xs font-medium hover:underline">Ver detalle →</a>
        </td>
      </tr>
    `}).join('');
  }

  function limpiar() {
    ['busPoliza','busCliente','busPlacas','busSerie','busFecha'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('busCompania').value = '';
    document.getElementById('resultados').classList.add('hidden');
    document.getElementById('sinResultados').classList.add('hidden');
  }
</script>
</body>
</html>
