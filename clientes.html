<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Gestión de Clientes</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="bg-blue-800 text-white p-4 flex justify-between">
<h1 class="text-xl font-bold">Clientes</h1>
<a href="dashboard.html" class="bg-red-500 px-3 py-1 rounded">Volver</a>
</div>

<div class="p-6">

<h2 class="text-xl font-bold mb-4">Agregar Cliente</h2>

<div class="bg-white p-4 rounded shadow mb-6">

<input class="border p-2 mb-2 w-full" placeholder="Nombre">
<input class="border p-2 mb-2 w-full" placeholder="Apellidos">
<input class="border p-2 mb-2 w-full" placeholder="Correo">
<input class="border p-2 mb-2 w-full" placeholder="Teléfono">

<button class="bg-green-600 text-white px-4 py-2 rounded">
Guardar Cliente
</button>

</div>

<h2 class="text-xl font-bold mb-2">Lista de Clientes</h2>

<table class="w-full bg-white shadow">

<tr class="bg-gray-200">
<th class="p-2">Nombre</th>
<th>Correo</th>
<th>Teléfono</th>
<th>Acciones</th>
</tr>

<tr class="text-center">
<td class="p-2">Juan Pérez</td>
<td>juan@email.com</td>
<td>8123456789</td>

<td class="space-x-2">
<button class="bg-yellow-500 text-white px-2 py-1 rounded">Editar</button>
<button class="bg-red-600 text-white px-2 py-1 rounded">Eliminar</button>
</td>
</tr>

</table>

</div>

</body>
</html>
