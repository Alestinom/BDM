<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar Siniestro – SiniestrosAuto</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
<div class="flex min-h-screen">

  <div id="sidebar"></div>

  <div class="flex-1 flex flex-col overflow-auto">

    <!-- Header -->
    <div class="bg-white border-b border-gray-200 px-8 py-4">
      <div class="flex items-center gap-2 text-sm text-gray-500 mb-1">
        <a href="dashboard.html" class="hover:text-blue-600">Panel</a>
        <span>›</span>
        <span class="text-gray-800 font-medium">Registrar Siniestro</span>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">Registrar Siniestro</h1>
    </div>

    <div class="p-8">
      <div class="max-w-3xl mx-auto">

        <!-- Alerta -->
        <div id="alertMsg" class="hidden text-sm px-4 py-3 rounded-lg mb-5"></div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-5">
          <h2 class="text-base font-semibold text-gray-800 mb-4 pb-2 border-b border-gray-100">Datos del Cliente y Unidad</h2>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1">Cliente (Asegurado) *</label>
              <select id="cliente" onchange="cargarPoliza()" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Seleccionar cliente</option>
                <option value="1" data-poliza="POL-00234" data-compania="AXA Seguros">Juan Pérez</option>
                <option value="2" data-poliza="POL-00891" data-compania="GNP Seguros">Ana López</option>
                <option value="3" data-poliza="POL-01102" data-compania="Qualitas">Carlos Mendoza</option>
              </select>
            </div>

            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1">Vehículo *</label>
              <select id="vehiculo" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Selecciona primero un cliente</option>
              </select>
            </div>

            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1">Número de Póliza</label>
              <input id="poliza" type="text" readonly placeholder="Se carga automáticamente"
                class="w-full border border-gray-200 bg-gray-50 rounded-lg px-3 py-2 text-sm text-gray-500 cursor-not-allowed">
            </div>

            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1">Compañía de Seguros</label>
              <input id="compania" type="text" readonly placeholder="Se carga automáticamente"
                class="w-full border border-gray-200 bg-gray-50 rounded-lg px-3 py-2 text-sm text-gray-500 cursor-not-allowed">
            </div>

          </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-5">
          <h2 class="text-base font-semibold text-gray-800 mb-4 pb-2 border-b border-gray-100">Datos del Siniestro</h2>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1">Fecha *</label>
              <input id="fecha" type="date" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1">Hora *</label>
              <input id="hora" type="time" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="sm:col-span-2">
              <label class="block text-xs font-medium text-gray-700 mb-1">Ubicación *</label>
              <input id="ubicacion" type="text" placeholder="Ej. Av. Constitución 1000, Monterrey, NL"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="sm:col-span-2">
              <label class="block text-xs font-medium text-gray-700 mb-1">¿Hubo otras unidades involucradas?</label>
              <select id="otras_unidades" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="no">No</option>
                <option value="si">Sí</option>
              </select>
            </div>

            <div class="sm:col-span-2">
              <label class="block text-xs font-medium text-gray-700 mb-1">Descripción del siniestro *</label>
              <textarea id="descripcion" rows="4" placeholder="Describe detalladamente lo que ocurrió..."
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
            </div>

          </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-5">
          <h2 class="text-base font-semibold text-gray-800 mb-1 pb-2 border-b border-gray-100">Material Multimedia</h2>
          <p class="text-xs text-gray-400 mb-4">Puedes subir múltiples fotos y videos del siniestro.</p>

          <div>
            <label class="block text-xs font-medium text-gray-700 mb-1">Imágenes del siniestro</label>
            <input type="file" id="imagenes" accept="image/*" multiple onchange="previsualizarImagenes(this)"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-500 file:mr-3 file:py-1 file:px-3 file:rounded file:border-0 file:bg-blue-50 file:text-blue-700 file:text-xs cursor-pointer mb-3">
            <div id="previewImagenes" class="grid grid-cols-3 gap-2"></div>
          </div>

          <div class="mt-4">
            <label class="block text-xs font-medium text-gray-700 mb-1">Videos del siniestro <span class="text-gray-400">(opcional)</span></label>
            <input type="file" id="videos" accept="video/*" multiple
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-500 file:mr-3 file:py-1 file:px-3 file:rounded file:border-0 file:bg-blue-50 file:text-blue-700 file:text-xs cursor-pointer">
          </div>
        </div>

        <div class="flex gap-3">
          <button onclick="guardarSiniestro()"
            class="flex-1 bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2.5 rounded-lg transition-colors text-sm">
            Guardar Siniestro
          </button>
          <a href="dashboard.html"
            class="px-6 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold rounded-lg transition-colors text-sm text-center">
            Cancelar
          </a>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="session.js"></script>
<script src="nav.js"></script>
<script>
  SESSION.requerir('registro_siniestro.html');
  document.getElementById('sidebar').innerHTML = renderNav('registro_siniestro.html');

  // Vehículos por cliente (en producción se cargará desde BD vía SP)
  const vehiculosPorCliente = {
    '1': [{ id: 1, label: 'ABC-123 · Toyota Corolla 2021', serie: '3VWFE21C04M000001' }],
    '2': [{ id: 2, label: 'XYZ-789 · Nissan Versa 2020',  serie: '3N1BC1APXAL000002' }],
    '3': [{ id: 3, label: 'MNO-456 · Honda Civic 2022',   serie: '2HGFG3B59DH000003' }],
  };

  function cargarPoliza() {
    const sel = document.getElementById('cliente');
    const opt = sel.options[sel.selectedIndex];
    document.getElementById('poliza').value = opt.dataset.poliza || '';
    document.getElementById('compania').value = opt.dataset.compania || '';

    // Cargar vehículos del cliente seleccionado
    const selVehiculo = document.getElementById('vehiculo');
    const clienteId = sel.value;
    selVehiculo.innerHTML = '<option value="">Seleccionar vehículo</option>';
    if (clienteId && vehiculosPorCliente[clienteId]) {
      vehiculosPorCliente[clienteId].forEach(v => {
        selVehiculo.innerHTML += `<option value="${v.id}" data-serie="${v.serie}">${v.label}</option>`;
      });
    } else {
      selVehiculo.innerHTML = '<option value="">Selecciona primero un cliente</option>';
    }
  }

  function previsualizarImagenes(input) {
    const container = document.getElementById('previewImagenes');
    container.innerHTML = '';
    Array.from(input.files).forEach(file => {
      const url = URL.createObjectURL(file);
      container.innerHTML += `<img src="${url}" class="rounded-lg w-full h-20 object-cover border border-gray-200">`;
    });
  }

  function showAlert(msg, tipo = 'error') {
    const el = document.getElementById('alertMsg');
    el.className = `text-sm px-4 py-3 rounded-lg mb-5 ${tipo === 'error' ? 'bg-red-50 border border-red-200 text-red-700' : 'bg-green-50 border border-green-200 text-green-700'}`;
    el.textContent = msg;
    el.classList.remove('hidden');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function guardarSiniestro() {
    const reqs = ['cliente', 'vehiculo', 'fecha', 'hora', 'ubicacion', 'descripcion'];
    for (const id of reqs) {
      if (!document.getElementById(id).value.trim()) {
        showAlert('Por favor completa todos los campos obligatorios.');
        return;
      }
    }
    showAlert('Siniestro registrado exitosamente. Estado: Registrado.', 'success');
    setTimeout(() => window.location.href = 'consulta.html', 1800);
  }
</script>
</body>
</html>
