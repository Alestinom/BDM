<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Gestión de Usuarios</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="bg-blue-800 text-white p-4 flex justify-between">
<h1 class="text-xl font-bold">Usuarios</h1>
<a href="dashboard.html" class="bg-red-500 px-3 py-1 rounded">Volver</a>
</div>

<div class="p-6">

<h2 class="text-xl font-bold mb-4">Registrar Usuario</h2>

<div class="bg-white p-4 rounded shadow mb-6">

<input class="border p-2 mb-2 w-full" placeholder="Nombre">
<input class="border p-2 mb-2 w-full" placeholder="Apellidos">
<input class="border p-2 mb-2 w-full" placeholder="Correo">

<select class="border p-2 mb-2 w-full">
<option>Tipo de Usuario</option>
<option>Ajustador</option>
<option>Supervisor</option>
<option>Asegurado</option>
</select>

<input type="password" class="border p-2 mb-2 w-full" placeholder="Contraseña">

<button class="bg-green-600 text-white px-4 py-2 rounded">
Guardar Usuario
</button>

</div>

<h2 class="text-xl font-bold mb-2">Lista de Usuarios</h2>

<table class="w-full bg-white shadow">

<tr class="bg-gray-200">
<th class="p-2">Nombre</th>
<th>Correo</th>
<th>Tipo</th>
<th>Acciones</th>
</tr>

<tr class="text-center">
<td class="p-2">Carlos Ramírez</td>
<td>carlos@email.com</td>
<td>Supervisor</td>

<td class="space-x-2">
<button class="bg-yellow-500 text-white px-2 py-1 rounded">Editar</button>
<button class="bg-red-600 text-white px-2 py-1 rounded">Eliminar</button>
</td>
</tr>

</table>

</div>

</body>
</html>
