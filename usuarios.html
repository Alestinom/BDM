<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios – SiniestrosAuto</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
<div class="flex min-h-screen">

  <div id="sidebar"></div>

  <div class="flex-1 flex flex-col overflow-auto">

    <div class="bg-white border-b border-gray-200 px-8 py-4">
      <div class="flex items-center gap-2 text-sm text-gray-500 mb-1">
        <a href="dashboard.html" class="hover:text-blue-600">Panel</a>
        <span>›</span>
        <span class="text-gray-800 font-medium">Usuarios</span>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">Gestión de Usuarios</h1>
    </div>

    <div class="p-8">

      <div id="alertMsg" class="hidden text-sm px-4 py-3 rounded-lg mb-5"></div>

      <!-- Formulario colapsable -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 mb-5">
        <button onclick="toggleForm()" class="w-full flex items-center justify-between px-6 py-4 text-left">
          <span class="font-semibold text-gray-800">+ Registrar nuevo usuario</span>
          <span id="formIcon" class="text-gray-400 text-lg">▾</span>
        </button>
        <div id="formContainer" class="hidden border-t border-gray-100 px-6 pb-6 pt-4">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1">Nombre *</label>
              <input id="nombre" type="text" placeholder="Nombre"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1">Apellidos *</label>
              <input id="apellidos" type="text" placeholder="Apellidos"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1">Fecha de nacimiento * <span class="text-gray-400">(mayor 18)</span></label>
              <input id="fechaNac" type="date"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1">Género *</label>
              <select id="genero" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Seleccionar</option>
                <option>Masculino</option>
                <option>Femenino</option>
                <option>Prefiero no decir</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1">Correo electrónico *</label>
              <input id="correo" type="email" placeholder="ejemplo@correo.com"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1">Alias * <span class="text-gray-400">(único)</span></label>
              <input id="alias" type="text" placeholder="@alias"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1">Tipo de Usuario *</label>
              <select id="tipo" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Seleccionar</option>
                <option>Ajustador</option>
                <option>Supervisor</option>
                <option>Asegurado</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1">Contraseña *</label>
              <input id="password" type="password" placeholder="Mínimo 8 caracteres"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
          </div>

          <!-- Requisitos contraseña -->
          <div class="mt-3 bg-gray-50 rounded-lg p-3 text-xs text-gray-500">
            <ul class="flex gap-4">
              <li id="req-len" class="text-red-400">✗ Mín. 8 caracteres</li>
              <li id="req-upper" class="text-red-400">✗ Una mayúscula</li>
              <li id="req-num" class="text-red-400">✗ Un número</li>
            </ul>
          </div>

          <div class="flex gap-3 mt-4">
            <button onclick="guardarUsuario()"
              class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-lg text-sm font-semibold transition-colors">
              Guardar Usuario
            </button>
            <button onclick="toggleForm()"
              class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-semibold transition-colors">
              Cancelar
            </button>
          </div>
        </div>
      </div>

      <!-- Tabla -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="px-5 py-3 border-b border-gray-100">
          <h2 class="text-sm font-semibold text-gray-700">Lista de Usuarios</h2>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="bg-gray-50 text-xs text-gray-500 uppercase tracking-wide">
                <th class="text-left px-5 py-3 font-semibold">Nombre</th>
                <th class="text-left px-5 py-3 font-semibold">Correo</th>
                <th class="text-left px-5 py-3 font-semibold">Alias</th>
                <th class="text-left px-5 py-3 font-semibold">Tipo</th>
                <th class="text-left px-5 py-3 font-semibold">Acciones</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-50">
              <tr class="hover:bg-gray-50">
                <td class="px-5 py-3 font-medium text-gray-800">Carlos Ramírez</td>
                <td class="px-5 py-3 text-gray-600">carlos@email.com</td>
                <td class="px-5 py-3 text-gray-500 font-mono text-xs">@cramirez</td>
                <td class="px-5 py-3">
                  <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-700">Supervisor</span>
                </td>
                <td class="px-5 py-3 space-x-2">
                  <button class="text-xs bg-yellow-50 text-yellow-700 border border-yellow-200 px-3 py-1 rounded-lg hover:bg-yellow-100">Editar</button>
                  <button onclick="confirmarEliminar('Carlos Ramírez')" class="text-xs bg-red-50 text-red-700 border border-red-200 px-3 py-1 rounded-lg hover:bg-red-100">Eliminar</button>
                </td>
              </tr>
              <tr class="hover:bg-gray-50">
                <td class="px-5 py-3 font-medium text-gray-800">Luis Garza</td>
                <td class="px-5 py-3 text-gray-600">luis@email.com</td>
                <td class="px-5 py-3 text-gray-500 font-mono text-xs">@lgarza</td>
                <td class="px-5 py-3">
                  <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-teal-100 text-teal-700">Ajustador</span>
                </td>
                <td class="px-5 py-3 space-x-2">
                  <button class="text-xs bg-yellow-50 text-yellow-700 border border-yellow-200 px-3 py-1 rounded-lg hover:bg-yellow-100">Editar</button>
                  <button onclick="confirmarEliminar('Luis Garza')" class="text-xs bg-red-50 text-red-700 border border-red-200 px-3 py-1 rounded-lg hover:bg-red-100">Eliminar</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal -->
<div id="modalEliminar" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
  <div class="bg-white rounded-xl shadow-2xl p-6 w-80">
    <h3 class="font-bold text-gray-800 mb-2">¿Eliminar usuario?</h3>
    <p class="text-sm text-gray-500 mb-5">¿Confirmas eliminar a <strong id="nombreEliminar"></strong>?</p>
    <div class="flex gap-3">
      <button onclick="cerrarModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 rounded-lg text-sm font-semibold">Cancelar</button>
      <button onclick="eliminar()" class="flex-1 bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg text-sm font-semibold">Eliminar</button>
    </div>
  </div>
</div>

<script src="nav.js"></script>
<script>
  document.getElementById('sidebar').innerHTML = renderNav('usuarios.html');

  function toggleForm() {
    const cont = document.getElementById('formContainer');
    const icon = document.getElementById('formIcon');
    const open = cont.classList.contains('hidden');
    cont.classList.toggle('hidden', !open);
    icon.textContent = open ? '▴' : '▾';
  }

  document.addEventListener('input', function(e) {
    if (e.target.id === 'password') {
      const v = e.target.value;
      setReq('req-len', v.length >= 8);
      setReq('req-upper', /[A-Z]/.test(v));
      setReq('req-num', /[0-9]/.test(v));
    }
  });

  function setReq(id, ok) {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = ok ? 'text-green-500' : 'text-red-400';
    el.textContent = (ok ? '✓' : '✗') + el.textContent.slice(1);
  }

  function showAlert(msg, tipo = 'success') {
    const el = document.getElementById('alertMsg');
    el.className = `text-sm px-4 py-3 rounded-lg mb-5 ${tipo === 'error' ? 'bg-red-50 border border-red-200 text-red-700' : 'bg-green-50 border border-green-200 text-green-700'}`;
    el.textContent = msg;
    el.classList.remove('hidden');
  }

  function calcularEdad(fecha) {
    const hoy = new Date(), nac = new Date(fecha);
    let e = hoy.getFullYear() - nac.getFullYear();
    if (hoy.getMonth() - nac.getMonth() < 0 || (hoy.getMonth() === nac.getMonth() && hoy.getDate() < nac.getDate())) e--;
    return e;
  }

  function guardarUsuario() {
    const reqs = ['nombre','apellidos','fechaNac','genero','correo','alias','tipo','password'];
    for (const id of reqs) {
      if (!document.getElementById(id).value.trim()) { showAlert('Completa todos los campos.', 'error'); return; }
    }
    if (calcularEdad(document.getElementById('fechaNac').value) < 18) {
      showAlert('El usuario debe ser mayor de 18 años.', 'error'); return;
    }
    const pass = document.getElementById('password').value;
    if (pass.length < 8 || !/[A-Z]/.test(pass) || !/[0-9]/.test(pass)) {
      showAlert('La contraseña no cumple los requisitos.', 'error'); return;
    }
    showAlert('Usuario registrado correctamente.');
    toggleForm();
  }

  function confirmarEliminar(nombre) {
    document.getElementById('nombreEliminar').textContent = nombre;
    document.getElementById('modalEliminar').classList.remove('hidden');
  }
  function cerrarModal() { document.getElementById('modalEliminar').classList.add('hidden'); }
  function eliminar() { cerrarModal(); showAlert('Usuario eliminado correctamente.'); }
</script>
</body>
</html>
